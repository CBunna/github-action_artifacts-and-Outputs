name: Deploy Website
on:
    push:
        branches:
            - main
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install dependencies
              run: npm ci
            - name: Lint code
              run: npm run lint
            - name: Run test
              run: npm test
    build:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Install dependencies
              run: npm ci
            - name: Build website
              run: npm run build
            - name: Upload artitacts
              uses: actions/upload-artifact@v4 # Uploading Build files as artifact
              with: # Configuration for uploading artifacts
                  name: dist-files # Name of the artifact
                  path:
                      | # Path to the files to be uploaded, dist folder and package.json
                      dist
                      package.json

    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Get Build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-files # Name of the artifact
            - name: Output contents
              run: ls
            - name: Deploy Website
              run: echo "Deploying..."
